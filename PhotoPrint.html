<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>綠幕美拍大師 - 專業版</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 修正 RWD 捲動問題 */
        html, body { 
            min-height: 100%; 
            margin: 0; 
            padding: 0; 
            background-color: #18181b;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        /* 鏡像翻轉樣式 */
        .mirror-view { transform: scaleX(-1); }
        
        .bg-grid { 
            background-image: radial-gradient(#333 1px, transparent 1px); 
            background-size: 20px 20px; 
        }
        
        /* 強制比例容器 */
        .ratio-container {
            position: relative;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            overflow: hidden;
            background: #000;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 4:3 比例 */
        .ratio-4-3 { aspect-ratio: 4 / 3; }
        /* 1:1 比例 */
        .ratio-1-1 { aspect-ratio: 1 / 1; }

        @media (max-width: 767px) {
            .preview-section {
                padding: 1rem;
                background: #000;
            }
        }

        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #22c55e;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
        }
    </style>
</head>
<body class="text-white font-sans flex flex-col">

    <!-- 標題列 -->
    <header class="h-14 p-3 md:p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900 shrink-0 sticky top-0 z-30">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center text-black">
                <i data-lucide="camera" class="w-5 h-5"></i>
            </div>
            <h1 class="text-base md:text-lg font-bold tracking-tight">綠幕美拍大師 <span class="hidden sm:inline text-xs font-normal text-zinc-500 ml-2">v3.2 Ratio-First</span></h1>
        </div>
        <div id="status-indicator" class="flex items-center gap-2 text-[10px] md:text-xs text-green-500">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
            </span>
            系統就緒
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row">
        <!-- 左側/上方：預覽區 -->
        <div class="preview-section relative flex-[2] lg:flex-[3] bg-black bg-grid flex items-center justify-center md:h-[calc(100vh-56px)] md:sticky md:top-14 p-2 md:p-8">
            
            <!-- 相機/編輯 比例容器 -->
            <div id="aspect-box" class="ratio-container ratio-4-3 shadow-2xl rounded-xl border border-white/10">
                <!-- 相機畫面 -->
                <div id="step-camera" class="absolute inset-0 flex items-center justify-center">
                    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                    <!-- 覆蓋層：導引框 -->
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div class="w-2/3 h-4/5 border-2 border-dashed border-green-500/30 rounded-full"></div>
                    </div>
                </div>

                <!-- 編輯畫面 (Canvas) -->
                <div id="step-editor" class="hidden absolute inset-0 flex items-center justify-center">
                    <canvas id="mainCanvas" class="w-full h-full object-contain bg-zinc-800"></canvas>
                </div>
            </div>

            <!-- 輔助按鈕：水平翻轉 -->
            <button id="btn-toggle-mirror" class="absolute bottom-6 left-6 md:bottom-12 md:left-12 bg-black/60 backdrop-blur-md px-3 py-2 rounded-lg border border-white/20 text-xs flex items-center gap-2 active:bg-zinc-700 z-20">
                <i data-lucide="flip-horizontal" class="w-4 h-4"></i> 水平翻轉
            </button>
        </div>

        <!-- 右側/下方：控制區 -->
        <div class="flex-1 bg-zinc-900 border-t md:border-t-0 md:border-l border-zinc-800">
            
            <!-- 相機控制面版 (包含比例切換) -->
            <div id="controls-camera" class="p-6 flex flex-col gap-8 min-h-[400px] md:min-h-[calc(100vh-56px)] justify-center">
                <div class="text-center">
                    <h2 class="text-lg font-semibold mb-1 text-green-400">第一步：設定並拍攝</h2>
                    <p class="text-zinc-400 text-xs leading-relaxed">請先選擇照片比例，再進行拍攝</p>
                </div>

                <!-- 拍照前的比例選擇 -->
                <section class="space-y-3">
                    <h3 class="text-xs uppercase tracking-widest text-zinc-500 font-bold flex items-center gap-2 justify-center">
                        <i data-lucide="maximize-2" class="w-4 h-4"></i> 照片比例
                    </h3>
                    <div class="grid grid-cols-2 gap-3 max-w-xs mx-auto">
                        <button data-ratio="1:1" class="ratio-btn py-3 rounded-xl border-2 border-zinc-800 bg-zinc-800/50 text-zinc-400 transition-all">1 : 1</button>
                        <button data-ratio="4:3" class="ratio-btn py-3 rounded-xl border-2 border-green-500 bg-green-500/10 text-white font-bold transition-all shadow-lg shadow-green-500/10">4 : 3</button>
                    </div>
                </section>
                
                <div class="flex flex-col items-center gap-4">
                    <button id="btn-capture" class="group relative w-24 h-24 md:w-32 md:h-32 bg-white rounded-full flex items-center justify-center shadow-2xl border-8 border-zinc-700 active:scale-90 transition-transform">
                        <div class="w-16 h-16 md:w-22 md:h-22 bg-red-500 rounded-full group-hover:bg-red-600 transition-colors shadow-inner"></div>
                    </button>
                    <span class="text-xs font-bold text-zinc-500 uppercase">按下快門</span>
                </div>
                
                <div class="flex justify-center">
                    <button id="btn-switch-cam" class="flex items-center gap-2 px-6 py-3 bg-zinc-800 rounded-xl text-zinc-400 hover:text-white transition-colors border border-zinc-700">
                        <i data-lucide="refresh-ccw" class="w-4 h-4"></i>
                        <span class="text-xs font-medium">切換鏡頭</span>
                    </button>
                </div>
            </div>

            <!-- 編輯控制面版 -->
            <div id="controls-editor" class="hidden p-5 md:p-8 space-y-8 pb-12">
                <div class="text-center">
                    <h2 class="text-lg font-semibold mb-1 text-green-400">第二步：更換背景</h2>
                    <p class="text-zinc-400 text-xs leading-relaxed">比例已固定，請選擇喜歡的背景</p>
                </div>

                <section>
                    <h3 class="text-xs uppercase tracking-widest text-zinc-500 font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="image" class="w-4 h-4"></i> 選擇背景
                    </h3>
                    <div id="bg-list" class="grid grid-cols-2 gap-3">
                        <!-- 由 JS 生成 -->
                    </div>
                </section>

                <section>
                    <h3 class="text-xs uppercase tracking-widest text-zinc-500 font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="wand-2" class="w-4 h-4"></i> 去背靈敏度微調
                    </h3>
                    <div class="bg-zinc-800/50 p-5 rounded-2xl border border-zinc-700/50">
                        <div class="flex justify-between text-[11px] text-zinc-500 mb-3">
                            <span>寬鬆</span>
                            <span id="similarity-val" class="text-green-400 font-bold text-sm">85</span>
                            <span>嚴格</span>
                        </div>
                        <input id="range-similarity" type="range" min="30" max="180" value="85" class="w-full h-2 bg-zinc-700 rounded-lg appearance-none cursor-pointer">
                    </div>
                </section>

                <div class="flex flex-col gap-4 pt-4 pb-10">
                    <button id="btn-download" class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-5 rounded-2xl flex items-center justify-center gap-2 shadow-xl active:scale-95 transition-all text-lg">
                        <i data-lucide="download"></i> 下載最終照片
                    </button>
                    <button id="btn-retake" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-medium py-4 rounded-2xl transition-colors">
                        回上一頁重新拍攝
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- 輔助畫布 -->
    <canvas id="tempCanvas" class="hidden"></canvas>

    <script>
        const BACKGROUNDS = [
            { id: 1, name: '極簡辦公室', url: 'https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80' },
            { id: 2, name: '渡假海灘', url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80' },
            { id: 3, name: '未來城市', url: 'https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&w=800&q=80' },
            { id: 4, name: '神祕森林', url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80' },
        ];

        let state = {
            step: 'camera',
            ratio: '4:3',
            bgIdx: 0,
            capturedBlob: null,
            isMirrored: false,
            similarity: 85,
            videoStream: null,
            facingMode: 'environment'
        };

        $(document).ready(function() {
            lucide.createIcons();
            initUI();
            startCamera();

            // 鏡像切換按鈕
            $('#btn-toggle-mirror').on('click', function() {
                state.isMirrored = !state.isMirrored;
                $('#video').toggleClass('mirror-view', state.isMirrored);
                $(this).toggleClass('bg-green-500 text-black', state.isMirrored);
            });

            // 比例切換 (拍照前決定)
            $('.ratio-btn').on('click', function() {
                state.ratio = $(this).data('ratio');
                
                // 更新 UI
                $('.ratio-btn').removeClass('border-green-500 bg-green-500/10 text-white font-bold shadow-lg shadow-green-500/10').addClass('border-zinc-800 bg-zinc-800/50 text-zinc-400 font-normal');
                $(this).addClass('border-green-500 bg-green-500/10 text-white font-bold shadow-lg shadow-green-500/10').removeClass('border-zinc-800 bg-zinc-800/50 text-zinc-400 font-normal');
                
                // 更新預覽區域形狀
                const $box = $('#aspect-box');
                if (state.ratio === '1:1') {
                    $box.removeClass('ratio-4-3').addClass('ratio-1-1');
                } else {
                    $box.removeClass('ratio-1-1').addClass('ratio-4-3');
                }
            });

            // 拍攝
            $('#btn-capture').on('click', takePhoto);

            // 去背滑桿
            $('#range-similarity').on('input', function() {
                state.similarity = parseInt($(this).val());
                $('#similarity-val').text(state.similarity);
                renderComposite();
            });

            // 下載與重拍
            $('#btn-download').on('click', savePhoto);
            $('#btn-retake').on('click', () => {
                switchStep('camera');
                startCamera(state.facingMode);
            });

            // 切換鏡頭
            $('#btn-switch-cam').on('click', () => {
                const nextMode = state.facingMode === 'user' ? 'environment' : 'user';
                startCamera(nextMode);
            });
        });

        function initUI() {
            const $list = $('#bg-list');
            BACKGROUNDS.forEach((bg, i) => {
                const active = i === 0 ? 'border-green-500 ring-2 ring-green-500/20' : 'border-transparent';
                $list.append(`
                    <button class="bg-item relative aspect-video rounded-xl overflow-hidden border-2 transition-all ${active}" data-idx="${i}">
                        <img src="${bg.url}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-end p-2">
                            <span class="text-[10px] truncate font-medium">${bg.name}</span>
                        </div>
                    </button>
                `);
            });

            $('.bg-item').on('click', function() {
                $('.bg-item').removeClass('border-green-500 ring-2 ring-green-500/20').addClass('border-transparent');
                $(this).addClass('border-green-500 ring-2 ring-green-500/20');
                state.bgIdx = $(this).data('idx');
                renderComposite();
            });
        }

        async function startCamera(mode = 'environment') {
            if (state.videoStream) {
                state.videoStream.getTracks().forEach(t => t.stop());
            }
            try {
                state.facingMode = mode;
                state.videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: mode, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                });
                $('#video')[0].srcObject = state.videoStream;
            } catch (err) {
                console.error("Camera Error:", err);
                alert("無法開啟相機，請檢查權限設定。");
            }
        }

        function takePhoto() {
            const video = $('#video')[0];
            const canvas = $('#tempCanvas')[0];
            
            if (video.videoWidth === 0) return;
            
            // 拍照時根據當前選定的比例進行「視覺裁切」
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            const targetRatio = state.ratio === '1:1' ? 1 : 4/3;
            
            let finalW, finalH;
            if (vWidth / vHeight > targetRatio) {
                finalH = vHeight;
                finalW = vHeight * targetRatio;
            } else {
                finalW = vWidth;
                finalH = vWidth / targetRatio;
            }

            canvas.width = finalW;
            canvas.height = finalH;
            const ctx = canvas.getContext('2d');
            
            const startX = (vWidth - finalW) / 2;
            const startY = (vHeight - finalH) / 2;

            if (state.isMirrored) {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }

            // 只繪製中心區域（符合比例）
            ctx.drawImage(video, startX, startY, finalW, finalH, 0, 0, finalW, finalH);
            
            state.capturedBlob = canvas.toDataURL('image/png');
            if (state.videoStream) {
                state.videoStream.getTracks().forEach(t => t.stop());
            }
            
            switchStep('editor');
            renderComposite();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchStep(step) {
            state.step = step;
            if (step === 'camera') {
                $('#step-camera, #controls-camera').show();
                $('#step-editor, #controls-editor').hide();
            } else {
                $('#step-camera, #controls-camera').hide();
                $('#step-editor, #controls-editor').show();
            }
        }

        function applyChromaKey(ctx, w, h) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            const target = { r: 80, g: 190, b: 100 };

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                const diff = Math.sqrt(
                    Math.pow(r - target.r, 2) + 
                    Math.pow(g - target.g, 2) + 
                    Math.pow(b - target.b, 2)
                );

                if (diff < state.similarity) {
                    data[i + 3] = 0;
                } else if (diff < state.similarity + 15) {
                    data[i + 3] = ((diff - state.similarity) / 15) * 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function renderComposite() {
            const canvas = $('#mainCanvas')[0];
            const ctx = canvas.getContext('2d');
            const bgImg = new Image();
            const personImg = new Image();

            bgImg.crossOrigin = "anonymous";
            bgImg.src = BACKGROUNDS[state.bgIdx].url;

            bgImg.onload = () => {
                const baseWidth = 1200;
                const baseHeight = state.ratio === '1:1' ? 1200 : 900;
                canvas.width = baseWidth;
                canvas.height = baseHeight;

                const bgRatio = bgImg.width / bgImg.height;
                const targetRatio = baseWidth / baseHeight;
                let bw, bh, bx, by;
                if (bgRatio > targetRatio) {
                    bh = baseHeight; bw = bgImg.width * (baseHeight / bgImg.height);
                    bx = (baseWidth - bw) / 2; by = 0;
                } else {
                    bw = baseWidth; bh = bgImg.height * (baseWidth / bgImg.width);
                    bx = 0; by = (baseHeight - bh) / 2;
                }
                ctx.drawImage(bgImg, bx, by, bw, bh);

                personImg.onload = () => {
                    const tCanvas = document.createElement('canvas');
                    tCanvas.width = personImg.width;
                    tCanvas.height = personImg.height;
                    const tCtx = tCanvas.getContext('2d');
                    tCtx.drawImage(personImg, 0, 0);
                    applyChromaKey(tCtx, tCanvas.width, tCanvas.height);

                    ctx.drawImage(tCanvas, 0, 0, baseWidth, baseHeight);
                };
                personImg.src = state.capturedBlob;
            };
        }

        function savePhoto() {
            const canvas = $('#mainCanvas')[0];
            const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
            const link = document.createElement('a');
            link.download = `GreenScreen_${state.ratio.replace(':','x')}_${Date.now()}.jpg`;
            link.href = dataUrl;
            link.click();
        }
    </script>
</body>
</html>
